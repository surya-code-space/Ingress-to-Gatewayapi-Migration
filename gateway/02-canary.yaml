# Step 4 — Canary traffic splitting (impossible with plain nginx Ingress)
# 90% → gpen-api-v1 (stable)  |  10% → gpen-api-v2 (canary)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gpen-route
spec:
  parentRefs:
  - name: gpen-gateway
  hostnames:
  - "gpen.local"
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: gpen-web
      port: 80
  - matches:
    - path: { type: PathPrefix, value: /api }
    backendRefs:
    - name: gpen-api-v1
      port: 80
      weight: 90
    - name: gpen-api-v2
      port: 80
      weight: 10
